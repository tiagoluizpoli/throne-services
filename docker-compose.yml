services:
  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: minio
    ports:
      - "9000:9000"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=9e428bc3-65d5-44e8-b977-d5d7486e361b
    volumes:
      - minio-data:/data
    command: server /data
    networks:
      - solutions
  postgres:
    image: postgres:15.3
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ADMSTA
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - solutions
volumes:
  minio-data:
  postgres-data:
networks:
  solutions:
    driver: bridge
